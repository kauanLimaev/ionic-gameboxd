<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Game Feed
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Game Feed</ion-title>
    </ion-toolbar>
  </ion-header>

  @if (loading) {
  <div id="games-grid">
    @for (_ of skeletonArray; track $index) {
    <ion-card>
      <ion-card-content>
        <ion-skeleton-text animated style="width: 100%; height: 280px;"></ion-skeleton-text>
      </ion-card-content>
    </ion-card>
    }
  </div>
  }
  @else {
  <div id="games-grid">
    @for (game of games; track game) {
    <ion-card (click)="openGameDetails(game.id)">
      <ion-text id="game-name">{{ game.name }}</ion-text>
      <img [src]="game.background_image" alt="{{ game.name }}" />
    </ion-card>
    }
  </div>
  }

  <ion-infinite-scroll [disabled]="hasError" threshold="100px" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Carregando mais jogos...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

  @if (errorMessage) {
  <ion-text color="danger">{{ errorMessage }}</ion-text>
  }
</ion-content>

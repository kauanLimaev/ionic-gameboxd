<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Game Feed
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Game Feed</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="games-grid">
    <ion-card *ngFor="let game of games">
      <img [src]="game.background_image" alt="{{ game.name }}" />
    </ion-card>
  </div>

  <ion-infinite-scroll threshold="100px" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Carregando mais jogos...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
